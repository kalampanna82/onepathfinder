<svg width="720" height="200" viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pathGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5A5"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#2563EB" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ICON MARK -->
  <g transform="translate(20,20)">
    <!-- faint unchosen paths (the roads not taken) -->
    <g stroke="#CBD5E1" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M20,150 L70,60 L150,90"/>
      <path d="M20,150 L100,140 L150,90"/>
      <path d="M20,150 L40,80 L90,30 L150,90"/>
    </g>

    <!-- the chosen path -->
    <path d="M20,150 Q60,40 150,90" stroke="url(#pathGrad)" stroke-width="7"
          fill="none" stroke-linecap="round" filter="url(#softShadow)"/>

    <!-- waypoint nodes along unchosen paths -->
    <g fill="#CBD5E1">
      <circle cx="70" cy="60" r="4"/>
      <circle cx="100" cy="140" r="4"/>
      <circle cx="40" cy="80" r="4"/>
      <circle cx="90" cy="30" r="4"/>
    </g>

    <!-- start node -->
    <circle cx="20" cy="150" r="11" fill="#0F172A"/>
    <circle cx="20" cy="150" r="11" fill="none" stroke="#0EA5A5" stroke-width="2.5"/>

    <!-- destination node / pin -->
    <circle cx="150" cy="90" r="13" fill="url(#pathGrad)"/>
    <circle cx="150" cy="90" r="4.5" fill="#FFFFFF"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(215,0)" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="0" y="100" font-family="Manrope, Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="#0F172A" letter-spacing="0.2">
      One<tspan fill="#2563EB">Path</tspan>Finder
    </text>
    <text x="2" y="128" font-size="15" font-weight="400" fill="#64748B" letter-spacing="3.5">
      FIND THE ONE WAY THROUGH
    </text>
  </g>
</svg>
